services:
  9n9:
    build: .
    container_name: 9n9
    restart: unless-stopped
    environment:
      CODEX_AGENT_URL: http://codex-agent:8080
      N9N_DATABASE_PATH: /data/9n9.db
      N9N_MASTER_KEY: ${N9N_MASTER_KEY:?N9N_MASTER_KEY is required}
      N9N_BOOTSTRAP_ADMIN_USERNAME: ${N9N_BOOTSTRAP_ADMIN_USERNAME:-admin}
      N9N_BOOTSTRAP_ADMIN_PASSWORD: ${N9N_BOOTSTRAP_ADMIN_PASSWORD:-}
      N9N_PUBLIC_ORIGIN: ${N9N_PUBLIC_ORIGIN:-http://192.168.1.95:9999}
      N9N_TRUSTED_LAN_ONLY: ${N9N_TRUSTED_LAN_ONLY:-false}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "9999:9999"
    volumes:
      - 9n9_data:/data
    networks:
      - default
      - codex
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9999/api/status').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  codex:
    external: true
    name: n8n_default

volumes:
  9n9_data:
